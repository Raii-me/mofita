<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
        }

        .chat-icon {
            width: 18px;
            height: 18px;
            margin-right: 5px;

        }

        .chat-content{
            display: flex;
            justify-content: center;
            align-items: center;

            width: 100%;
            border: 3px solid rgb(222, 215, 215);
            border-radius: 30px;
            padding: 10px;
            font-weight: 500;
            box-shadow: 4px 4px 10px rgb(239, 238, 238);
            
        }

        .botao-fixo {
        
            position: fixed;
            left: 90%;
            bottom: 10px;

        }

        a{
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="botao-fixo">
        
        <div class="chat-content">
            <a href="#">
            <img src="images/chat.png" class="chat-icon">
            ChatBot</a>
        </div>
        
    </div>


   
</body>

</html>
