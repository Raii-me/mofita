<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        .main-cont{
            width: 100%;
            height: 100vh;
            background-color: rgb(193, 212, 180);
            
        }

        .box-cont{
            background-color: aquamarine;
            width: 1000px;
            height: 600px;
            margin-left: 25%;
            margin-top: 10%;
            
        }

        .caixa-left{
            width: 50%;
            height: 100%;
            background-color: black;
            margin: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 30px;
        }

        .caixa{
            background-color: rgb(123, 143, 87);
            height: 150px;
            width: 150px;
        }

        .right{
            display: flex;
            justify-content: center;
            align-items: center;
        }




    </style>
</head>
<body>
    <div class="main-cont">
        <div class="box-cont">
            
            <div class="caixa-left">
                <div class="caixa">1</div>
                <div class="caixa">2</div>
                <div class="caixa">3</div>
                <div class="caixa">4</div>
            </div>

            <div class="right">
                <div class="caixa">5</div>
            </div>
            
        </div>
    </div>
</body>
</html>
