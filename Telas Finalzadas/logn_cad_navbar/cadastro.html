<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="./css/cadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <div class="container">

        <div class="right">
            <div class="form-container">

                <form action="back-end/server.js" method="POST">

                    <div class="logo">
                        <img src="images/logo.png">
                    </div>

                    <div class="escolherPag">
                        <a href="login.html">Entrar</a>
                        <a href="cadastro.html">Cadastrar</a>
                    </div>

                    <h1>Bem vindo de Volta!</h1>

                    <p class="titulo">
                        Entre comm sa cona no site Reda+!
                    </p>

                   
                    <input type="email" name="email" placeholder="Email" required>

                    <div class="senha-box">
                        <input id="senha" type="password" name="senha" placeholder="Senha" required>
                        <i class="fa-solid fa-lock cadeado" onclick="toggleSenha('senha')"></i>
                    </div>


                    <div class="forgot-password">
                        <a href="#">Esqueci minha senha</a>
                    </div>




                    <button class="btn-login" type="submit">
                        Login
                    </button>

                    <div class="detalhe">
                        <div class="linha"></div>
                        <span>Ou</span>
                        <div class="linha"></div>
                    </div>

                    <button class="btn-google" type="button">
                        <img class="google" src="images/google.png">
                        Login com Google
                    </button>
                </form>
            </div>
        </div>

        <div class="left">

            <div class="left-container">
                <img class="banner" src="images/grafico.png">

                <p class="texto-titulo">
                    Treine hoje. Conquiste a nota 1000 amanhã.
                </p>

                <h5 class="texto-descricao">
                    Faça parte da nossa comunidade agora!
                </h5>
            </div>

        </div>

    </div>

    <script>

        function toggleSenha(id) {

            const input = document.getElementById(id);

            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }

        }

    </script>

</body>

</html>
