<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            padding: 0;
            margin: 0;
        }

        .header {
            background-color: blanchedalmond;
            height: 50px;
        }

        .header-content {
            font-size: 20px;
            color: rgb(253, 0, 0);
            padding: 15px
        }

        .titulo{
            text-align: center;
            padding: 20px;
            font-size: 50px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container-caixa{
            display: flex;
            justify-content: center;
            gap:50px;
        }

        .caixa{
            display: flex;
            justify-content: center;
            align-items: center;

            background-color: aquamarine;
            width:150px;
            height:150px;
        }


        .btn{
            display: flex;
            justify-content: center;
            align-items: center;
            padding:50px;
        }

        .btn button{
            width: 200px;
            height:48px;
            background-color: brown;
            border: none;
            border-radius: 10px;
            font-size: 20px;
            color:white;
        }


        .footer{
            background-color: cadetblue;
            height:50px;
        }

        .footer-content{
            font-size: 20px;
            padding: 15px;

        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-content">
            Conteudo do header
        </div>
    </div>


    <div class="titulo">
        Titulo
    </div>

   <div class="container-caixa">
        <div class="caixa">Caixa 1</div>
        <div class="caixa">Caixa 2</div>
        <div class="caixa">Caixa 3</div>
   </div>

   <div class="btn">
        <button>Botão</button>
   </div>




    <div class="footer">
        <div class="footer-content">
            Conteudo do footer
        </div>
    </div>



</body>

</html>
